<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Tarefas</title>
    <link rel="stylesheet" href="main.css">
</head>

<body class="light-theme">
    <main class="page">
        <header class="header">
            <div>
                <h1>Lista de tarefas</h1>
            </div>
            <button class="btn theme-toggle">Escuro</button>
        </header>

        <section class="task-panel">
            <p class="task-title">Tarefas atuais:</p>

            <div class="task-input-group">
                <input id="newTask" type="text" placeholder="Digite uma nova tarefa" aria-label="Nova tarefa">
                <button id="addTask" class="btn add-btn">Adicionar</button>
            </div>

            <ul id="taskList" class="task-list">
                <li>Adicionar estilos visuais</li>
                <li>Adicionar temas claros e escuros</li>
                <li>Habilitar a alternância do tema</li>
            </ul>
        </section>
    </main>

    <script src="app.js"></script>
    <noscript>Você precisa habilitar o JavaScript para ver o site completo.</noscript>

</body>
</html>
